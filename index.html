window.run_agent_memory_sql = async function(sql) {
  sql = sql.trim();
  if (sql.startsWith('INSERT OR REPLACE INTO saves')) {
    var m = sql.match(/'(\{.*\})'/);
    if (m) { try { localStorage.setItem('rpg_save', m[1]); } catch(e) {} }
    return [];
  }
  if (sql.startsWith('SELECT data FROM saves')) {
    var s = localStorage.getItem('rpg_save');
    return s ? [{data: s}] : [];
  }
  if (sql.startsWith('CREATE TABLE')) { return []; }
  return [];
};

ugh you!","Ghostly claws rake your soul!","She screams and reality cracks!"],drops:"Ectoplasm \xB7 Spirit Veil"},{name:"Dark Knight",hp:420,atk:100,xp:420,gold:220,minLvl:14,icon:"\u{1F5A4}",rarity:"RARE",color:"#556688",type:"Humanoid",lore:"A fallen paladin consumed by shadow magic. He wields a blade that hungers for the light he once carried.",weakness:"Holy & Light",resistance:"Dark & Poison",ability:{name:"Shadow Cleave",desc:"Every 4th hit deals triple damage",chance:.25},attacks:["The dark blade cleaves downward!","Shadow energy erupts from his sword!","He lunges with terrifying speed!"],drops:"Shadow Shard \xB7 Cursed Plate"},{name:"Ancient Lich",hp:1200,atk:350,xp:2500,gold:1100,minLvl:22,icon:"\u2620",rarity:"EPIC",color:"#aa44ff",type:"Undead/Arcane",lore:"A sorcerer who transcended death through forbidden rites.",weakness:"Holy & Fire",resistance:"Magic & Cold",ability:{name:"Soul Rend",desc:"Drains 8% max HP per hit",chance:.45},attacks:["Necrotic energy surges through you!","Skeletal hands erupt from the ground!","A void bolt rips through your soul!"],drops:"Lich Phylactery \xB7 Soul Crystal \xB7 Arcane Tome"},{name:"Chaos Elemental",hp:3e3,atk:500,xp:5e3,gold:2200,minLvl:28,icon:"\u{1F300}",rarity:"LEGENDARY",color:"#ff00ff",type:"Elemental/Void",lore:"Entropy made flesh. Looking at it causes reality distortion.",weakness:"Order Magic",resistance:"Everything",ability:{name:"Reality Fracture",desc:"Randomises ATK \xB150% each turn",chance:1},attacks:["The fabric of space strikes you!","A kaleidoscope of elements tears through!","Gravity reverses and slams you!"],drops:"Chaos Shard \xB7 Void Essence \xB7 Reality Fragment"}],yf={name:"THE VOID TITAN",hp:5e3,atk:1100,xp:1e4,gold:5e3,icon:"\u{1F441}",rarity:"BOSS",color:"#ff0033",type:"Cosmic Horror",lore:"The Void Titan predates creation. It does not live \u2014 it unmakes.",weakness:"Unknown",resistance:"All known damage types",ability:{name:"Void Crush",desc:"Every 4th attack deals triple damage",chance:.25},attacks:["Reality tears open and something reaches through!","An eye the size of a moon focuses on you!","Tentacles from outside time lash at your existence!","It speaks a syllable and your HP responds!","Darkness condenses into a fist!"],drops:"Void Core \xB7 Titan Fragment \xB7 Cosmic Essence \xB7 Champion's Seal"},ge=[{id:"blacksmith",name:"Elara",title:"The Blacksmith",icon:"\u{1F528}",color:"#ff8844",chapter:"Chapter I \xB7 The Cold Forge",unlocksAfter:null,intro:"The forge has been cold since the night Malgrath attacked. I remember the screams, the sky turning crimson as his shadow swept across Eldenmere. My apprentice was lost that night, my finest blades shattered. Without weapons, none of us can defend ourselves. The monsters that once feared us now roam freely through our fields. Prove your courage \u2014 slay 3 of the beasts that prowl our lands \u2014 and I will relight the forge. My hammer awaits a worthy cause.",active:"Stay safe out there. We need you alive more than we need heroes.",outcome:"The forge roars to life once more. Smoke rises over Eldenmere for the first time in months.",quest:{type:"kills",target:3,desc:"Defeat 3 monsters"},reward:{type:"weapon",item:{name:"Elara's Blade",atk:35,desc:"Hand-forged with care"},text:"My finest blade. May it serve you better than it served me."}},{id:"healer",name:"Brother Aldric",title:"The Healer",icon:"\u26EA",color:"#44ff88",chapter:"Chapter II \xB7 The Healing Spring",unlocksAfter:"blacksmith",intro:"With the forge relit, hope stirs... but half the village still suffers from Malgrath's shadow plague. Each night, more fall ill \u2014 their skin turns grey, their eyes hollow. The ancient healing spring lies a day's journey through wolf-infested forest. Its waters once cured all ailments, but none have dared make the journey since the attack. I am too old to go alone. Reach Level 5 and I shall know you are strong enough to protect me on the path. The sick cannot wait much longer.",active:"Train hard. Every level you gain brings life back to these people.",outcome:"Aldric returns from the healing spring. The sick rise from their beds. A child laughs for the first time in weeks.",quest:{type:"level",target:5,desc:"Reach Level 5"},reward:{type:"gold_pots",gold:200,pots:3,text:"The spring's waters were a miracle. Take these for your own wounds, brave soul."}},{id:"captain",name:"Capt. Varen",title:"Guard Captain",icon:"\u{1F5E1}",color:"#4488ff",chapter:"Chapter III \xB7 The Broken Walls",unlocksAfter:"healer",intro:"The village walls crumbled the night Malgrath came. I was captain of the guard, yet I could do nothing as his dark fire turned stone to dust. My guards are too few and too frightened \u2014 some deserted in the chaos. The monsters smell our weakness and grow bolder each day. Last week they took farmer Holt's livestock. Tomorrow they may take his children. Show me true strength \u2014 clear 5 more beasts from our lands \u2014 and I will rally what remains of my men to rebuild the guard post and restore order.",active:"Every monster you slay makes Eldenmere a little safer. Keep going.",outcome:"Varen's guards stand watch at the rebuilt gate. For the first time, the people of Eldenmere sleep without fear.",quest:{type:"kills",target:5,desc:"Defeat 5 monsters"},reward:{type:"armor",item:{name:"Varen's Plate",def:50,desc:"Guard-issue heavy plate"},text:"You fight like a soldier. You deserve to be armoured like one."}},{id:"merchant",name:"Mira",title:"The Merchant",icon:"\u{1F4BC}",color:"#ffdd44",chapter:"Chapter IV \xB7 The Empty Market",unlocksAfter:"captain",intro:"With walls rebuilt and the sick healed, Eldenmere breathes again... but breathing is not living. The trade caravans stopped coming the day Malgrath appeared. Merchants fear our roads. The market stalls that once overflowed with spices, silks, and exotic weapons now sit empty and rotting. Winter approaches, and without trade, we will starve. Show me that gold still flows in this land \u2014 earn 300g from your battles \u2014 and I will send word to the travelling merchants that Eldenmere is open once more. I have something truly special hidden in my vault for someone who can make this happen.",active:"Gold is hope. Bring enough and this village will live through the winter.",outcome:"Mira reopens the market stalls. Traders from distant towns return. The smell of fresh bread fills the village square.",quest:{type:"combat_gold",target:300,desc:"Earn 300g from combat"},reward:{type:"weapon",item:{name:"Shadow Dagger",atk:80,desc:"Stolen from darkness"},text:"This dagger was taken from a shadow-spawn the night of the attack. It has waited for the right hands."}},{id:"scholar",name:"Aria",title:"Arcane Scholar",icon:"\u{1F4DA}",color:"#cc66ff",chapter:"Chapter V \xB7 The Final Scroll",unlocksAfter:"merchant",intro:"Eldenmere is healing, and my heart swells with pride at what you have accomplished. But we are fools if we think it is over. Malgrath still lives \u2014 I can feel his presence in the trembling of the earth, the unnatural cold that creeps in at dusk. Before the library burned, I saved one scroll \u2014 a text so ancient its language was old when the first kings walked this land. It speaks of a ritual to weaken Malgrath's immortal shell, to strip away the void that protects him. But it requires arcane knowledge to decipher. Study the mystic arts and return to me. This is the final piece. Once you understand the scroll, nothing stands between you and the Shadow Dragon. The fate of Eldenmere \u2014 and perhaps the world \u2014 rests on your shoulders.",active:"Study hard. The scroll's secrets will only reveal themselves to a trained mind.",outcome:"Aria reads aloud from the ancient scroll: 'The shadow shall fall before the light of one who has walked the darkness and returned.' She looks up at you. 'You are ready, hero. Go and end this.'",quest:{type:"research_count",target:1,desc:"Research any skill"},reward:{type:"stats",int:3,desc:"Ancient Tome: +3
