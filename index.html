<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Python Quest RPG</title>
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0a0a0f;color:#eee;}</style>
</head>
<body>
<div id="root"></div>
<script>

window.__ls_save = function(data){ try{ localStorage.setItem('rpg_save', JSON.stringify(data)); }catch(e){} };
window.__ls_load = function(){ try{ var s=localStorage.getItem('rpg_save'); return s?JSON.parse(s):null; }catch(e){ return null; } };

// Override SQL calls with localStorage
window.run_agent_memory_sql = async function(sql) {
  sql = sql.trim();
  if (sql.startsWith('INSERT OR REPLACE INTO saves')) {
    var m = sql.match(/'(\{.*\})'/);
    if (m) { try { localStorage.setItem('rpg_save', m[1]); } catch(e) {} }
    return [];
  }
  if (sql.startsWith('SELECT data FROM saves')) {
    var s = localStorage.getItem('rpg_save');
    return s ? [{data: s}] : [];
  }
  if (sql.startsWith('CREATE TABLE')) { return []; }
  return [];
};
</script>
